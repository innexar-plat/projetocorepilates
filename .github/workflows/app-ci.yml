name: App CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/app-ci.yml'
  push:
    branches:
      - main
      - develop
    paths:
      - 'app/**'
      - '.github/workflows/app-ci.yml'

concurrency:
  group: app-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Type check
        run: npm exec tsc -- --noEmit


  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: type-check
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run integration tests
        run: npm run test:integration

  coverage-tests:
    name: Coverage Tests
    runs-on: ubuntu-latest
    needs: type-check
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run tests with coverage
        run: npm run test:ci


  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs:
      - type-check
      - integration-tests
      - coverage-tests
    steps:
      - name: Gate summary
        run: echo "All quality checks passed."
